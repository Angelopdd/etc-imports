// Calcula o próximo contato do cliente com base na etapa ATUAL e nas regras de prazo.
// Regras definidas:
// - Etapa "Aguardando entrega": aguardando o pedido ser entregue (sem contador).
// - Etapa "Pedido entregue": começa a contar 2 dias (do vínculo) a partir da data de entrega.
//   A data de entrega é gravada quando a vendedora move o cliente para esta etapa.
// - Etapa "Vínculo pós-compra": prazo de 2 dias contados a partir da data de entrega.
// - Etapas "Prova social" (7d), "1ª venda" (14d), "2ª venda" (45d): contam a partir da DATA DA COMPRA.
// - Etapa "Concluído": sem próximo contato.
// Retorna { cor, texto, prazoISO } ou null.
function calcProximoContato(cliente, etapas) {
  if (!etapas || etapas.length === 0) return null;
  const idx = etapas.findIndex(e => e.id === cliente.etapa);
  const atual = etapas[idx];
  if (!atual) return null;

  // Aguardando entrega: sem contador, esperando entregar
  if (atual.id === 'aguardando_entrega') {
    return {
      cor: TEXT_MUTED,
      texto: 'Aguardando entrega',
      prazoISO: null
    };
  }

  // Concluído ou etapas sem prazo definido (exceto pedido_entregue tratado abaixo)
  if (atual.id === 'concluido') {
    return {
      cor: VERDE,
      texto: 'Ciclo concluído',
      prazoISO: null
    };
  }

  // "Pedido entregue" e "Vínculo": contam 2 dias a partir da data de entrega

    const diasVinculo = 2;

      // Ainda não há data de entrega registrada
      return {
        cor: TEXT_MUTED,
        texto: 'Marque a entrega para iniciar',
        prazoISO: null
      };
    }
    const prazoISO = addDias(cliente.data_entrega, diasVinculo);
    const d = diasEntre(prazoISO);
    const nome = 'Vínculo';
    if (d < 0) return {
      cor: VERMELHO,
      texto: nome + ' · atrasado ' + Math.abs(d) + 'd',
      prazoISO
    };
    if (d === 0) return {
      cor: LARANJA,
      texto: nome + ' · contatar HOJE',
      prazoISO
    };
    return {
      cor: GOLD,
      texto: nome + ' · em ' + d + 'd',
      prazoISO
    };
  }

  // Demais etapas (prova social, vendas): contam a partir da data da compra
  if (atual.dias_apos_compra === null || atual.dias_apos_compra === undefined) {
    return {
      cor: VERDE,
      texto: 'Sem prazo',
      prazoISO: null
    };
  }

  if (!base) return null;
  const prazoISO = addDias(base, atual.dias_apos_compra);

  if (d === null) return null;
  const nome = atual.nome;
  if (d < 0) return {
    cor: VERMELHO,
    texto: nome + ' · atrasado ' + Math.abs(d) + 'd',
    prazoISO
  };

    cor: LARANJA,
    texto: nome + ' · contatar HOJE',
    prazoISO
  };
