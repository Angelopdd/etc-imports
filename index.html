<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const SUPABASE_URL = 'https://bkpkcfdqymwpnnulfhcs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NMow0Dy6d3vSUsHbSM-G6Q_nX5tYVhm';

const GOLD = '#C9A24A';
const BG = '#0A0A0A';
const BG_2 = '#111111';
const BG_CARD = '#161616';
const BORDER = '#262626';
const TEXT = '#F5F5F5';
const TEXT_MUTED = '#9A9A9A';
const TEXT_DIM = '#666666';
const VERDE = '#97C459';
const VERMELHO = '#E24B4A';
const LARANJA = '#EF9F27';

const ICONES = ['🆕','📋','🚚','✅','💬','🎯','⭐','📦','💰','🎁','👑','📞','💎','🔔','📅','🚀','💼','📝','🏆','💡','🎉','⚡','🔥','✨','🤝','📸','🛍️'];
const CORES = [
{ nome: 'Azul', valor: '#5B8DEF' },{ nome: 'Laranja', valor: '#EF9F27' },{ nome: 'Roxo', valor: '#A57DD4' },
{ nome: 'Verde claro', valor: '#5DCAA5' },{ nome: 'Dourado', valor: '#C9A24A' },{ nome: 'Rosa', valor: '#D4537E' },
{ nome: 'Verde', valor: '#97C459' },{ nome: 'Vermelho', valor: '#E24B4A' },{ nome: 'Ciano', valor: '#4DD0E1' },{ nome: 'Cinza', valor: '#888888' },
];

// Cidades locais: contato em 2 dias após a compra (com contagem real correndo).
// Outras cidades: contato após a entrega prevista.
const CIDADES_LOCAIS = ['petrolina', 'juazeiro'];
function ehCidadeLocal(cidade) {
if (!cidade) return false;
const c = cidade.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
return CIDADES_LOCAIS.some(loc => c.includes(loc));
}

const headers = { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', Prefer: 'return=representation' };

async function api(table, method, path, body) {
const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + (path || ''), { method, headers, body: body ? JSON.stringify(body) : undefined });
if (!res.ok) throw new Error(await res.text());
if (method === 'DELETE' || res.status === 204) return null;
const t = await res.text();
return t ? JSON.parse(t) : null;
}

function formatDate(iso) { if (!iso) return '—'; const [y, m, d] = iso.split('-'); return d + '/' + m + '/' + y.slice(2); }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function diasEntre(iso) { if (!iso) return null; return Math.round((new Date(iso) - new Date(todayISO())) / 86400000); }
function diasDesde(iso) { if (!iso) return null; return Math.round((new Date(todayISO()) - new Date(iso)) / 86400000); }
function fmtMoeda(v) { if (v === null || v === undefined || v === '') return '—'; return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

function useIsMobile() {
const [m, setM] = useState(typeof window !== 'undefined' && window.innerWidth <= 640);
useEffect(() => { const h = () => setM(window.innerWidth <= 640); window.addEventListener('resize', h); return () => window.removeEventListener('resize', h); }, []);
return m;
}

// Calcula o "prazo de contato" de um cliente conforme a regra por cidade.
// Retorna { cor, texto, prazoISO } ou null.
function calcPrazoContato(cliente) {
const local = ehCidadeLocal(cliente.cidade);
if (local) {
// contato 2 dias após a compra
const base = cliente.data_compra;
if (!base) return null;
const prazo = new Date(base); prazo.setDate(prazo.getDate() + 2);
const prazoISO = prazo.toISOString().split('T')[0];
const d = diasEntre(prazoISO);
if (d === null) return null;
if (d < 0) return { cor: VERMELHO, texto: 'Contatar (passou ' + Math.abs(d) + 'd)', prazoISO };
if (d === 0) return { cor: LARANJA, texto: 'Contatar hoje', prazoISO };
return { cor: GOLD, texto: 'Contato em ' + d + 'd', prazoISO };
} else {
// outras cidades: usa a previsão de entrega
const base = cliente.previsao_entrega;
if (!base) return { cor: TEXT_MUTED, texto: 'Definir previsão', prazoISO: null };
const d = diasEntre(base);
if (d === null) return null;
if (d < 0) return { cor: VERMELHO, texto: 'Entregue há ' + Math.abs(d) + 'd — contatar', prazoISO: base };
if (d === 0) return { cor: LARANJA, texto: 'Entrega prevista hoje', prazoISO: base };
return { cor: '#5B8DEF', texto: 'Entrega em ' + d + 'd', prazoISO: base };
}
}

function App() {
const [clientes, setClientes] = useState([]);
const [etapas, setEtapas] = useState([]);
const [loading, setLoading] = useState(true);
const [modalCliente, setModalCliente] = useState(null);
const [clienteEditando, setClienteEditando] = useState(null);
const [busca, setBusca] = useState('');
const [filtroEtapa, setFiltroEtapa] = useState('todos');
const [view, setView] = useState('kanban');
const [tela, setTela] = useState('clientes');
const isMobile = useIsMobile();

useEffect(() => {
carregar();
const i = setInterval(carregar, 15000);
return () => clearInterval(i);
}, []);

async function carregar() {
try {
const [ets, cls] = await Promise.all([
api('etapas', 'GET', '?order=ordem.asc&ativa=eq.true'),
api('clientes_posvenda', 'GET', '?order=created_at.desc'),
]);
setEtapas(ets || []);
setClientes(cls || []);
setLoading(false);
} catch (e) { console.error(e); setLoading(false); }
}

async function salvarCliente(dados) {
try {
if (dados._delete) { await api('clientes_posvenda', 'DELETE', '?id=eq.' + dados.id); }
else if (dados.id) { const { id, created_at, _delete, ...r } = dados; await api('clientes_posvenda', 'PATCH', '?id=eq.' + id, { ...r, updated_at: new Date().toISOString() }); }
else { await api('clientes_posvenda', 'POST', '', dados); }
await carregar();
setModalCliente(null);
setClienteEditando(null);
} catch (e) { alert('Erro: ' + e.message); }
}

async function moverEtapa(cliente, novaEtapa) {
setClientes(p => p.map(c => c.id === cliente.id ? { ...c, etapa: novaEtapa } : c));
try { await api('clientes_posvenda', 'PATCH', '?id=eq.' + cliente.id, { etapa: novaEtapa, updated_at: new Date().toISOString() }); }
catch (e) { alert('Erro: ' + e.message); await carregar(); }
}

// Registra a data de último contato ao enviar WhatsApp
async function registrarContato(cliente) {
const hoje = todayISO();
setClientes(p => p.map(c => c.id === cliente.id ? { ...c, ultimo_contato: hoje } : c));
try { await api('clientes_posvenda', 'PATCH', '?id=eq.' + cliente.id, { ultimo_contato: hoje, updated_at: new Date().toISOString() }); }
catch (e) { console.error(e); }
}

const clientesFiltrados = useMemo(() => clientes.filter(c => {
const b = busca.toLowerCase();
const mb = !busca || c.nome.toLowerCase().includes(b) || (c.whatsapp || '').includes(busca) || (c.produto || '').toLowerCase().includes(b) || (c.cidade || '').toLowerCase().includes(b);
const me = filtroEtapa === 'todos' || c.etapa === filtroEtapa;
return mb && me;
}), [clientes, busca, filtroEtapa]);

const metricas = useMemo(() => {
const finalId = etapas[etapas.length - 1]?.id;
return {
total: clientes.length,
contatar: clientes.filter(c => { const p = calcPrazoContato(c); return p && (p.cor === VERMELHO || p.cor === LARANJA) && c.etapa !== finalId; }).length,
local: clientes.filter(c => ehCidadeLocal(c.cidade)).length,
concluidos: clientes.filter(c => c.etapa === finalId).length,
};
}, [clientes, etapas]);

return (
<div style={{ minHeight: '100vh', background: BG }}>
<Header tela={tela} setTela={setTela} onNovoCliente={() => { setClienteEditando(null); setModalCliente(true); }} view={view} setView={setView} isMobile={isMobile} />
<div style={{ maxWidth: 1400, margin: '0 auto', padding: isMobile ? '0 12px 80px' : '0 20px 40px' }}>
{tela === 'clientes' ? (
<>
<Metricas metricas={metricas} isMobile={isMobile} />
<Filtros busca={busca} setBusca={setBusca} filtroEtapa={filtroEtapa} setFiltroEtapa={setFiltroEtapa} etapas={etapas} totalFiltrado={clientesFiltrados.length} isMobile={isMobile} />
{loading ? <Loading /> : clientes.length === 0 ? (
<EstadoVazio onAdicionar={() => { setClienteEditando(null); setModalCliente(true); }} />
) : view === 'kanban' ? (
<Kanban clientes={clientesFiltrados} etapas={etapas} onEditar={c => { setClienteEditando(c); setModalCliente(true); }} onMover={moverEtapa} onContato={registrarContato} isMobile={isMobile} />
) : (
<Lista clientes={clientesFiltrados} etapas={etapas} onEditar={c => { setClienteEditando(c); setModalCliente(true); }} onMover={moverEtapa} onContato={registrarContato} isMobile={isMobile} />
)}
</>
) : (
<TelaConfig etapas={etapas} onAtualizar={carregar} isMobile={isMobile} />
)}
</div>
{modalCliente && <ModalCliente cliente={clienteEditando} etapas={etapas} onSalvar={salvarCliente} onFechar={() => { setModalCliente(null); setClienteEditando(null); }} isMobile={isMobile} />}
{isMobile && tela === 'clientes' && (
<button onClick={() => { setClienteEditando(null); setModalCliente(true); }} style={{ position: 'fixed', bottom: 'calc(20px + env(safe-area-inset-bottom))', right: 20, width: 56, height: 56, borderRadius: '50%', background: GOLD, color: '#000', border: 'none', fontSize: 28, fontWeight: 700, boxShadow: '0 4px 20px rgba(201,162,74,0.4)', zIndex: 40, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>+</button>
)}
</div>
);
}

function Header({ tela, setTela, onNovoCliente, view, setView, isMobile }) {
return (
<div style={{ borderBottom: '1px solid ' + BORDER, background: BG, position: 'sticky', top: 0, zIndex: 50, paddingTop: 'env(safe-area-inset-top)' }}>
<div style={{ maxWidth: 1400, margin: '0 auto', padding: isMobile ? '14px 12px' : '18px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
<div style={{ display: 'flex', alignItems: 'center', gap: 12, flex: isMobile ? 1 : 'initial', minWidth: 0 }}>
<div style={{ width: 38, height: 38, border: '1.5px solid ' + GOLD, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 4, flexShrink: 0 }}>
<span style={{ color: GOLD, fontWeight: 800, fontSize: 13, letterSpacing: 1 }}>ETC</span>
</div>
<div style={{ minWidth: 0 }}>
<div style={{ fontSize: isMobile ? 14 : 15, fontWeight: 600, letterSpacing: 0.3 }}>ETC IMPORTS</div>
<div style={{ fontSize: 10, color: TEXT_MUTED, letterSpacing: 1.5, textTransform: 'uppercase' }}>{tela === 'clientes' ? 'Pós-venda' : 'Configurações'}</div>
</div>
</div>
<div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
<button onClick={() => setTela(tela === 'clientes' ? 'config' : 'clientes')} style={{ background: 'transparent', color: tela === 'config' ? GOLD : TEXT_MUTED, border: '1px solid ' + BORDER, padding: '8px 12px', borderRadius: 6, fontSize: 13, fontWeight: 600, minWidth: 40 }}>{tela === 'clientes' ? '⚙️' : '←'}</button>
{tela === 'clientes' && (
<div style={{ display: 'flex', background: BG_CARD, border: '1px solid ' + BORDER, borderRadius: 6, padding: 3 }}>
<button onClick={() => setView('kanban')} style={{ background: view === 'kanban' ? GOLD : 'transparent', color: view === 'kanban' ? '#000' : TEXT_MUTED, border: 'none', padding: isMobile ? '6px 10px' : '6px 12px', borderRadius: 4, fontSize: 12, fontWeight: 600 }}>Kanban</button>
<button onClick={() => setView('lista')} style={{ background: view === 'lista' ? GOLD : 'transparent', color: view === 'lista' ? '#000' : TEXT_MUTED, border: 'none', padding: isMobile ? '6px 10px' : '6px 12px', borderRadius: 4, fontSize: 12, fontWeight: 600 }}>Lista</button>
</div>
)}
{tela === 'clientes' && !isMobile && (
<button onClick={onNovoCliente} style={{ background: GOLD, color: '#000', border: 'none', padding: '10px 18px', borderRadius: 6, fontSize: 13, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 6 }}><span style={{ fontSize: 16, lineHeight: 1 }}>+</span> Nova venda</button>
)}
</div>
</div>
</div>
);
}

function Metricas({ metricas, isMobile }) {
const cards = [
{ label: 'Total', valor: metricas.total, cor: GOLD },
{ label: 'Contatar agora', valor: metricas.contatar, cor: VERMELHO },
{ label: 'Clientes locais', valor: metricas.local, cor: '#5B8DEF' },
{ label: 'Concluídos', valor: metricas.concluidos, cor: VERDE },
];
return (
<div style={{ display: 'grid', gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(auto-fit, minmax(160px, 1fr))', gap: isMobile ? 8 : 12, marginTop: isMobile ? 16 : 24, marginBottom: isMobile ? 16 : 24 }}>
{cards.map(c => (

<div style={{ fontSize: isMobile ? 22 : 26, fontWeight: 700, color: c.cor }}>{c.valor}</div>
</div>
))}
</div>

}

function Filtros({ busca, setBusca, filtroEtapa, setFiltroEtapa, etapas, totalFiltrado, isMobile }) {
return (
<div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
<input type="text" inputMode="search" placeholder="Buscar cliente, cidade..." value={busca} onChange={e => setBusca(e.target.value)} style={{ flex: 1, minWidth: isMobile ? '100%' : 200, background: BG_CARD, border: '1px solid ' + BORDER, borderRadius: 8, padding: '11px 14px', color: TEXT, fontSize: 14 }} />
<select value={filtroEtapa} onChange={e => setFiltroEtapa(e.target.value)} style={{ background: BG_CARD, border: '1px solid ' + BORDER, borderRadius: 8, padding: '11px 14px', color: TEXT, fontSize: 13, flex: isMobile ? 1 : 'initial', minWidth: 140 }}>
<option value="todos">Todas etapas</option>
{etapas.map(e => <option key={e.id} value={e.id}>{e.icone} {e.nome}</option>)}
</select>
{!isMobile && <div style={{ fontSize: 12, color: TEXT_MUTED, whiteSpace: 'nowrap' }}>{totalFiltrado} {totalFiltrado === 1 ? 'cliente' : 'clientes'}</div>}
</div>
);
}

// Abre WhatsApp com a mensagem escolhida, aplicando variáveis
function abrirWhatsapp(cliente, template, onContato) {
const n = (cliente.whatsapp || '').replace(/\D/g, '');
const nc = n.startsWith('55') ? n : '55' + n;
const msg = (template || 'Olá {nome}!').replace(/\{nome\}/g, cliente.nome).replace(/\{produto\}/g, cliente.produto || '');
window.open('https://wa.me/' + nc + '?text=' + encodeURIComponent(msg), '_blank');
if (onContato) onContato(cliente);
}

// Modal para escolher qual das 2 mensagens enviar
function ModalMensagem({ cliente, etapa, onEscolher, onFechar, isMobile }) {
useEffect(() => {
const prev = document.body.style.overflow;
document.body.style.overflow = 'hidden';
return () => { document.body.style.overflow = prev; };
}, []);
const opcoes = [];
if (etapa?.mensagem_whatsapp) opcoes.push({ label: 'Opção 1', texto: etapa.mensagem_whatsapp });
if (etapa?.mensagem_whatsapp_2) opcoes.push({ label: 'Opção 2', texto: etapa.mensagem_whatsapp_2 });
if (opcoes.length === 0) opcoes.push({ label: 'Padrão', texto: 'Olá {nome}!' });

function preview(t) { return t.replace(/\{nome\}/g, cliente.nome).replace(/\{produto\}/g, cliente.produto || ''); }

return (
<div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 110, display: 'flex', alignItems: isMobile ? 'flex-end' : 'center', justifyContent: 'center', padding: isMobile ? 0 : 20, overscrollBehavior: 'contain' }} onClick={onFechar}>
<div onClick={e => e.stopPropagation()} style={{ background: BG_CARD, border: '1px solid ' + BORDER, borderRadius: isMobile ? '16px 16px 0 0' : 12, padding: isMobile ? '18px 16px calc(18px + env(safe-area-inset-bottom))' : 24, width: '100%', maxWidth: isMobile ? '100%' : 480, maxHeight: isMobile ? '85vh' : '90vh', overflowY: 'auto', WebkitOverflowScrolling: 'touch', overscrollBehavior: 'contain' }}>
<div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
<h2 style={{ fontSize: 17, fontWeight: 600, margin: 0 }}>Escolha a mensagem</h2>
<button onClick={onFechar} style={{ background: 'transparent', border: 'none', color: TEXT_MUTED, fontSize: 26, lineHeight: 1, width: 32, height: 32 }}>×</button>
</div>
<div style={{ fontSize: 12, color: TEXT_MUTED, marginBottom: 16 }}>{etapa?.icone} {etapa?.nome} — para {cliente.nome}</div>
<div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
{opcoes.map((op, i) => (
<div key={i} style={{ border: '1px solid ' + BORDER, borderRadius: 10, padding: 14, background: BG }}>
<div style={{ fontSize: 11, color: GOLD, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>{op.label}</div>
<div style={{ fontSize: 13.5, color: TEXT, lineHeight: 1.5, marginBottom: 12, whiteSpace: 'pre-wrap' }}>{preview(op.texto)}</div>
<button onClick={() => onEscolher(op.texto)} style={{ width: '100%', background: '#25D366', color: '#000', border: 'none', padding: '11px', borderRadius: 8, fontSize: 13, fontWeight: 700 }}>💬 Enviar esta</button>
</div>
))}
</div>
</div>
</div>
);
}

function Kanban({ clientes, etapas, onEditar, onMover, onContato, isMobile }) {
const colWidth = isMobile ? 270 : 290;
return (
<div style={{ display: 'flex', gap: isMobile ? 10 : 12, overflowX: 'auto', paddingBottom: 16, scrollSnapType: isMobile ? 'x mandatory' : 'none', WebkitOverflowScrolling: 'touch' }}>
{etapas.map(etapa => {
const ce = clientes.filter(c => c.etapa === etapa.id);
return (
<div key={etapa.id} style={{ minWidth: colWidth, width: colWidth, flexShrink: 0, scrollSnapAlign: isMobile ? 'start' : 'none' }}>

<div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
<span style={{ fontSize: 15 }}>{etapa.icone}</span>
<span style={{ fontSize: 13, fontWeight: 600 }}>{etapa.nome}</span>
</div>
<span style={{ background: BG, color: TEXT_MUTED, padding: '2px 8px', borderRadius: 10, fontSize: 11, fontWeight: 600 }}>{ce.length}</span>
</div>
<div style={{ background: BG_2, border: '1px solid ' + BORDER, borderTop: 'none', borderRadius: '0 0 8px 8px', padding: 8, minHeight: 200, display: 'flex', flexDirection: 'column', gap: 8 }}>
{ce.length === 0 ? <div style={{ padding: '20px 12px', textAlign: 'center', color: TEXT_DIM, fontSize: 12 }}>Vazio</div> : ce.map(c => <CardCliente key={c.id} cliente={c} etapas={etapas} onEditar={onEditar} onMover={onMover} onContato={onContato} />)}
</div>
</div>
);
})}
</div>
);
}

function CardCliente({ cliente, etapas, onEditar, onMover, onContato, showEtapa }) {
const [modalMsg, setModalMsg] = useState(false);
const idx = etapas.findIndex(e => e.id === cliente.etapa);
const atual = etapas[idx];
const prox = etapas[idx + 1];
const ant = etapas[idx - 1];
const prazo = calcPrazoContato(cliente);
const local = ehCidadeLocal(cliente.cidade);

function ModalCliente({ cliente, etapas, onSalvar, onFechar, isMobile }) {
const [form, setForm] = useState({
nome: cliente?.nome || '', whatsapp: cliente?.whatsapp || '', cidade: cliente?.cidade || '',
produto: cliente?.produto || '', valor_compra: cliente?.valor_compra ?? '',
data_compra: cliente?.data_compra || todayISO(), previsao_entrega: cliente?.previsao_entrega || '',
ultimo_contato: cliente?.ultimo_contato || '',
etapa: cliente?.etapa || etapas[0]?.id || 'aguardando_entrega',
observacoes: cliente?.observacoes || '', id: cliente?.id,
});

const local = ehCidadeLocal(form.cidade);

function submeter() {
if (!form.nome || !form.whatsapp || !form.produto) { alert('Preencha nome, WhatsApp e produto'); return; }
// Para cidades não-locais, previsão de entrega é importante; para locais usamos data_compra+2
if (!local && !form.previsao_entrega) { alert('Para cidades fora de Petrolina/Juazeiro, informe a previsão de entrega (ex: data estimada).'); return; }
const d = { ...form };
if (!d.previsao_entrega) { const p = new Date(d.data_compra); p.setDate(p.getDate() + 2); d.previsao_entrega = p.toISOString().split('T')[0]; }
if (!d.ultimo_contato) d.ultimo_contato = null;
if (!d.observacoes) d.observacoes = null;
if (d.valor_compra === '' || d.valor_compra === null) d.valor_compra = null;
else d.valor_compra = Number(d.valor_compra);
onSalvar(d);
}

<div>

</div>

</div>

<div><label style={lst}>WhatsApp / Telefone</label><input type="tel" style={ist} value={form.whatsapp} onChange={e => setForm({ ...form, whatsapp: e.target.value })} placeholder="(87) 99999-9999" /></div>
<div><label style={lst}>Cidade</label><input style={ist} value={form.cidade} onChange={e => setForm({ ...form, cidade: e.target.value })} placeholder="Petrolina - PE" /></div>
</div>
{form.cidade && (
<div style={{ fontSize: 11.5, color: local ? GOLD : '#5B8DEF', background: (local ? GOLD : '#5B8DEF') + '15', borderRadius: 8, padding: '8px 12px', lineHeight: 1.4 }}>
{local ? '📍 Cidade local: o contato de vínculo aparece 2 dias após a compra.' : '📦 Outra cidade: informe a previsão de entrega abaixo. O contato é feito após a entrega.'}
</div>
)}
<div><label style={lst}>Produto</label><input style={ist} value={form.produto} onChange={e => setForm({ ...form, produto: e.target.value })} placeholder="Corrente Cartier 3mm" /></div>
<div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
<div><label style={lst}>Valor da compra (R$)</label><input type="number" step="0.01" style={ist} value={form.valor_compra} onChange={e => setForm({ ...form, valor_compra: e.target.value })} placeholder="0,00" /></div>
<div><label style={lst}>Data compra</label><input type="date" style={ist} value={form.data_compra} onChange={e => setForm({ ...form, data_compra: e.target.value })} /></div>
</div>
<div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
<div><label style={lst}>Previsão entrega {local ? '(opcional)' : ''}</label><input type="date" style={ist} value={form.previsao_entrega} onChange={e => setForm({ ...form, previsao_entrega: e.target.value })} /></div>
<div><label style={lst}>Último contato</label><input type="date" style={ist} value={form.ultimo_contato} onChange={e => setForm({ ...form, ultimo_contato: e.target.value })} /></div>
</div>
<div><label style={lst}>Etapa atual</label><select style={ist} value={form.etapa} onChange={e => setForm({ ...form, etapa: e.target.value })}>{etapas.map(et => <option key={et.id} value={et.id}>{et.icone} {et.nome}</option>)}</select></div>
<div><label style={lst}>Observações da atendente</label><textarea style={{ ...ist, minHeight: 70, resize: 'vertical' }} value={form.observacoes} onChange={e => setForm({ ...form, observacoes: e.target.value })} placeholder="Anote preferências, respostas do cliente, etc." /></div>

<button onClick={onFechar} style={{ flex: 1, background: 'transparent', border: '1px solid ' + BORDER, color: TEXT, padding: '13px', borderRadius: 8, fontSize: 14, fontWeight: 600 }}>Cancelar</button>
<button onClick={submeter} style={{ flex: 2, background: GOLD, color: '#000', border: 'none', padding: '13px', borderRadius: 8, fontSize: 14, fontWeight: 700 }}>{cliente ? 'Salvar' : 'Cadastrar'}</button>
</div>
</div>
</div>
);
}

function TelaConfig({ etapas, onAtualizar, isMobile }) {
const [editando, setEditando] = useState(null);
const [criando, setCriando] = useState(false);

async function mover(etapa, dir) {
const idx = etapas.findIndex(e => e.id === etapa.id);
const n = idx + dir;
if (n < 0 || n >= etapas.length) return;
const outra = etapas[n];
try {
await api('etapas', 'PATCH', '?id=eq.' + etapa.id, { ordem: outra.ordem });
await api('etapas', 'PATCH', '?id=eq.' + outra.id, { ordem: etapa.ordem });
onAtualizar();
} catch (e) { alert('Erro: ' + e.message); }
}

async function remover(etapa) {
if (!confirm('Remover a etapa "' + etapa.nome + '"?\n\nClientes nessa etapa precisarão ser movidos manualmente depois.')) return;
try { await api('etapas', 'DELETE', '?id=eq.' + etapa.id); onAtualizar(); }
catch (e) { alert('Erro: ' + e.message); }
}

return (
<div style={{ marginTop: isMobile ? 16 : 24 }}>
<div style={{ display: 'flex', justifyContent: 'space-between', alignItems: isMobile ? 'flex-start' : 'center', marginBottom: 16, flexWrap: 'wrap', gap: 12 }}>
<div>
<h2 style={{ fontSize: isMobile ? 18 : 22, fontWeight: 600, margin: 0 }}>Etapas do funil</h2>
<p style={{ fontSize: 12, color: TEXT_MUTED, marginTop: 4, lineHeight: 1.5 }}>Edite, reordene, adicione ou remova etapas. Cada etapa tem 2 opções de mensagem.</p>
</div>
<button onClick={() => setCriando(true)} style={{ background: GOLD, color: '#000', border: 'none', padding: '10px 16px', borderRadius: 8, fontSize: 13, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap' }}><span style={{ fontSize: 16 }}>+</span> Nova etapa</button>
</div>
<div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
{etapas.map((etapa, idx) => (
<div key={etapa.id} style={{ background: BG_CARD, border: '1px solid ' + BORDER, borderLeft: '4px solid ' + etapa.cor, borderRadius: 10, padding: isMobile ? 12 : 16, display: 'flex', alignItems: 'center', gap: isMobile ? 8 : 12 }}>
<div style={{ display: 'flex', flexDirection: 'column', gap: 2, flexShrink: 0 }}>
<button onClick={() => mover(etapa, -1)} disabled={idx === 0} style={{ background: 'transparent', border: '1px solid ' + BORDER, color: idx === 0 ? TEXT_DIM : TEXT_MUTED, width: 26, height: 20, borderRadius: 4, fontSize: 10, padding: 0 }}>▲</button>
<button onClick={() => mover(etapa, 1)} disabled={idx === etapas.length - 1} style={{ background: 'transparent', border: '1px solid ' + BORDER, color: idx === etapas.length - 1 ? TEXT_DIM : TEXT_MUTED, width: 26, height: 20, borderRadius: 4, fontSize: 10, padding: 0 }}>▼</button>
</div>
<div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, background: etapa.cor + '22', borderRadius: 8, flexShrink: 0 }}>{etapa.icone}</div>
<div style={{ flex: 1, minWidth: 0 }}>
<div style={{ fontSize: 14, fontWeight: 600 }}>{etapa.nome}{etapa.dias_apos_compra != null ? <span style={{ color: TEXT_DIM, fontWeight: 400 }}> · {etapa.dias_apos_compra}d</span> : ''}</div>
<div style={{ fontSize: 11, color: TEXT_MUTED, marginTop: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{etapa.mensagem_whatsapp ? etapa.mensagem_whatsapp.split('\n')[0].slice(0, 45) : 'Sem mensagem'}{etapa.mensagem_whatsapp_2 ? ' • +1 opção' : ''}</div>
</div>
<div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
<button onClick={() => setEditando(etapa)} style={{ background: 'transparent', border: '1px solid ' + BORDER, color: TEXT, padding: '8px 12px', borderRadius: 6, fontSize: 12, fontWeight: 600 }}>Editar</button>
<button onClick={() => remover(etapa)} style={{ background: 'transparent', border: '1px solid ' + BORDER, color: '#E24B4A', padding: '8px 10px', borderRadius: 6, fontSize: 14 }}>×</button>
</div>
</div>
))}
</div>
{(editando || criando) && (
<ModalEtapa etapa={editando} criando={criando} etapasExistentes={etapas} onSalvar={async d => {
try {
if (criando) {
const o = Math.max(0, ...etapas.map(e => e.ordem)) + 1;
await api('etapas', 'POST', '', { ...d, ordem: o });
} else { await api('etapas', 'PATCH', '?id=eq.' + editando.id, { ...d, updated_at: new Date().toISOString() }); }
setEditando(null); setCriando(false); onAtualizar();
} catch (e) { alert('Erro: ' + e.message); }
}} onFechar={() => { setEditando(null); setCriando(false); }} isMobile={isMobile} />
)}
</div>
);
}

function ModalEtapa({ etapa, criando, etapasExistentes, onSalvar, onFechar, isMobile }) {
const [form, setForm] = useState({
id: etapa?.id || '', nome: etapa?.nome || '', icone: etapa?.icone || '📋',
cor: etapa?.cor || GOLD, mensagem_whatsapp: etapa?.mensagem_whatsapp || '',
mensagem_whatsapp_2: etapa?.mensagem_whatsapp_2 || '',
dias_apos_compra: etapa?.dias_apos_compra ?? '', objetivo: etapa?.objetivo || '',
});

function submeter() {
if (!form.nome) { alert('Preencha o nome'); return; }
const d = { ...form };
if (d.dias_apos_compra === '' || d.dias_apos_compra === null) d.dias_apos_compra = null;
else d.dias_apos_compra = Number(d.dias_apos_compra);
if (!d.mensagem_whatsapp_2) d.mensagem_whatsapp_2 = null;
if (!d.objetivo) d.objetivo = null;
if (criando && !d.id) {
d.id = form.nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
if (etapasExistentes.some(e => e.id === d.id)) d.id = d.id + '_' + Date.now();
}
onSalvar(d);
}

const ist = { width: '100%', background: BG, border: '1px solid ' + BORDER, borderRadius: 8, padding: '12px 14px', color: TEXT, fontSize: 15, fontFamily: 'inherit' };
const lst = { fontSize: 11, color: TEXT_MUTED, textTransform: 'uppercase', letterSpacing: 1, fontWeight: 600, marginBottom: 6, display: 'block' };

return (
<div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 100, display: 'flex', alignItems: isMobile ? 'flex-end' : 'center', justifyContent: 'center', padding: isMobile ? 0 : 20, overscrollBehavior: 'contain' }} onClick={onFechar}>
<div onClick={e => e.stopPropagation()} style={{ background: BG_CARD, border: '1px solid ' + BORDER, borderRadius: isMobile ? '16px 16px 0 0' : 12, padding: isMobile ? '20px 16px calc(20px + env(safe-area-inset-bottom))' : 24, width: '100%', maxWidth: isMobile ? '100%' : 560, maxHeight: isMobile ? '88vh' : '90vh', overflowY: 'auto', WebkitOverflowScrolling: 'touch', overscrollBehavior: 'contain' }}>
<div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
<h2 style={{ fontSize: 18, fontWeight: 600, margin: 0 }}>{criando ? 'Nova etapa' : 'Editar etapa'}</h2>
<button onClick={onFechar} style={{ background: 'transparent', border: 'none', color: TEXT_MUTED, fontSize: 26, lineHeight: 1, width: 32, height: 32 }}>×</button>
</div>
<div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
<div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 10 }}>
<div><label style={lst}>Nome da etapa</label><input style={ist} value={form.nome} onChange={e => setForm({ ...form, nome: e.target.value })} placeholder="Vínculo pós-compra" /></div>
<div><label style={lst}>Dias após compra</label><input type="number" style={ist} value={form.dias_apos_compra} onChange={e => setForm({ ...form, dias_apos_compra: e.target.value })} placeholder="2" /></div>
</div>
<div><label style={lst}>Objetivo (opcional)</label><input style={ist} value={form.objetivo} onChange={e => setForm({ ...form, objetivo: e.target.value })} placeholder="Criar vínculo e reforçar cuidados" /></div>
<div>
<label style={lst}>Ícone</label>
<div style={{ display: 'grid', gridTemplateColumns: isMobile ? 'repeat(6, 1fr)' : 'repeat(9, 1fr)', gap: 6 }}>
{ICONES.map(ic => <button key={ic} onClick={() => setForm({ ...form, icone: ic })} style={{ background: form.icone === ic ? GOLD + '33' : BG, border: '1px solid ' + (form.icone === ic ? GOLD : BORDER), borderRadius: 6, padding: '8px 0', fontSize: 18 }}>{ic}</button>)}
</div>
</div>
<div>
<label style={lst}>Cor</label>
<div style={{ display: 'grid', gridTemplateColumns: isMobile ? 'repeat(3, 1fr)' : 'repeat(5, 1fr)', gap: 6 }}>
{CORES.map(c => <button key={c.valor} onClick={() => setForm({ ...form, cor: c.valor })} style={{ background: c.valor, border: form.cor === c.valor ? '2px solid #fff' : '2px solid transparent', borderRadius: 6, padding: '12px 0', color: '#000', fontSize: 10, fontWeight: 700 }}>{c.nome}</button>)}
</div>
</div>
<div>
<label style={lst}>Mensagem WhatsApp — Opção 1</label>
<textarea style={{ ...ist, minHeight: 90, resize: 'vertical', lineHeight: 1.5 }} value={form.mensagem_whatsapp} onChange={e => setForm({ ...form, mensagem_whatsapp: e.target.value })} placeholder="Use {nome} e {produto}" />
</div>
<div>
<label style={lst}>Mensagem WhatsApp — Opção 2 (opcional)</label>
<textarea style={{ ...ist, minHeight: 90, resize: 'vertical', lineHeight: 1.5 }} value={form.mensagem_whatsapp_2} onChange={e => setForm({ ...form, mensagem_whatsapp_2: e.target.value })} placeholder="Segunda opção de mensagem" />
<div style={{ fontSize: 11, color: TEXT_MUTED, marginTop: 6, lineHeight: 1.6 }}>
📌 Variáveis: <code style={{ background: BG, padding: '2px 6px', borderRadius: 4, color: GOLD }}>{'{nome}'}</code> <code style={{ background: BG, padding: '2px 6px', borderRadius: 4, color: GOLD, marginLeft: 4 }}>{'{produto}'}</code>
</div>
</div>
</div>
<div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
<button onClick={onFechar} style={{ flex: 1, background: 'transparent', border: '1px solid ' + BORDER, color: TEXT, padding: '13px', borderRadius: 8, fontSize: 14, fontWeight: 600 }}>Cancelar</button>
<button onClick={submeter} style={{ flex: 2, background: GOLD, color: '#000', border: 'none', padding: '13px', borderRadius: 8, fontSize: 14, fontWeight: 700 }}>{criando ? 'Criar' : 'Salvar'}</button>
</div>
</div>
</div>
);
}

function Loading() { return <div style={{ display: 'flex', justifyContent: 'center', padding: 80, color: TEXT_MUTED }}>Carregando...</div>; }

function EstadoVazio({ onAdicionar }) {
return (
<div style={{ background: BG_CARD, border: '1px dashed ' + BORDER, borderRadius: 12, padding: '50px 20px', textAlign: 'center' }}>
<div style={{ fontSize: 40, marginBottom: 14 }}>👑</div>
<div style={{ fontSize: 16, fontWeight: 600, marginBottom: 6 }}>Nenhuma venda ainda</div>
<div style={{ fontSize: 13, color: TEXT_MUTED, marginBottom: 20 }}>As vendas do ERP aparecem aqui automaticamente</div>
<button onClick={onAdicionar} style={{ background: GOLD, color: '#000', border: 'none', padding: '12px 24px', borderRadius: 8, fontSize: 14, fontWeight: 700 }}>Cadastrar manual</button>
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
